# Railway service config for the Phantom Go auth/content server.
#
# Build: the multi-stage Dockerfile in this directory (server/). Provision a
# PostgreSQL plugin in the Railway project; its connection string is wired to
# DB_URL (see docs/deploy/railway-runbook.md). No Redis: rate-limit counters and
# auth challenges live in Postgres (migration 011).
#
# The admin API is also mounted on the public port (see cmd/server/main.go), so
# only one port needs exposing. Set PUBLIC_PORT to the port Railway targets (8080).
#
# Migrations run automatically on boot (db.RunMigrations); a fresh Railway Postgres
# is built from migrations 001..009 on first start.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "./phantom-server"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
